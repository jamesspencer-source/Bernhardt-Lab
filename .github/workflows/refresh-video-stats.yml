name: Refresh YouTube view stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  refresh-video-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh featured video stats
        run: python scripts/refresh_youtube_video_stats.py --video-id RxHTaTmPlwQ

      - name: Commit refreshed video stats
        run: |
          if git diff --quiet -- assets/data/youtube-video-stats.json github-flat/assets/data/youtube-video-stats.json; then
            echo "No video stat changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/youtube-video-stats.json github-flat/assets/data/youtube-video-stats.json
          git commit -m "chore: refresh featured video view stats"
          git push
